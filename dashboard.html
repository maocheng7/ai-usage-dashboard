<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 模型监控面板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3a;--text:#e4e4e7;--dim:#71717a;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--blue:#3b82f6;--purple:#a855f7;--cyan:#06b6d4}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px;font-size:13px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.header h1{font-size:18px;font-weight:600;display:flex;align-items:center;gap:8px}
.header h1 .dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.header-actions{display:flex;gap:8px;align-items:center}
.header-actions button{background:var(--card);border:1px solid var(--border);color:var(--dim);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .15s}
.header-actions button:hover{color:var(--text);border-color:var(--dim)}
.header-actions button.active{color:var(--blue);border-color:var(--blue)}

.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;transition:all .2s}
.stat:hover{border-color:var(--dim)}
.stat .label{font-size:11px;color:var(--dim);margin-bottom:4px}
.stat .value{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
.stat .sub{font-size:11px;color:var(--dim);margin-top:2px}
.stat .trend{font-size:11px;margin-top:4px;display:flex;align-items:center;gap:4px}
.stat .trend.up{color:var(--green)}
.stat .trend.down{color:var(--red)}

.main-content{display:grid;grid-template-columns:1fr 350px;gap:16px;margin-bottom:16px}
@media(max-width:1200px){.main-content{grid-template-columns:1fr}}

.provider-cards{display:flex;flex-direction:column;gap:12px}
.prov-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.prov-card .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.prov-card .name{font-size:14px;font-weight:600}
.prov-card .status{display:flex;align-items:center;gap:6px}
.prov-card .status-dot{width:6px;height:6px;border-radius:50%}
.prov-card .status-dot.online{background:var(--green);box-shadow:0 0 6px var(--green)}
.prov-card .status-dot.cooling{background:var(--red);box-shadow:0 0 6px var(--red)}

.prov-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.prov-stat{background:var(--bg);border-radius:6px;padding:8px 10px;text-align:center}
.prov-stat .val{font-size:16px;font-weight:600;font-variant-numeric:tabular-nums}
.prov-stat .lbl{font-size:10px;color:var(--dim);margin-top:2px}

.prov-card .models{display:flex;flex-direction:column;gap:6px}
.prov-card .model-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--bg);border-radius:6px;font-size:12px;transition:all .2s}
.prov-card .model-row:hover{background:#1e2130}
.prov-card .model-row .left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.prov-card .model-row .model-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prov-card .model-row .bar-wrap{width:100px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;flex-shrink:0}
.prov-card .model-row .bar-fill{height:100%;border-radius:2px;transition:width .5s ease}
.prov-card .model-row .right{color:var(--dim);font-variant-numeric:tabular-nums;text-align:right;min-width:100px}

.prov-card .last-error{margin-top:8px;font-size:11px;color:var(--red);padding:6px 8px;background:var(--bg);border-radius:4px}

.chart-section{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.chart-title{font-size:13px;font-weight:600;color:var(--dim)}

.date-range{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.date-range button{background:var(--bg);border:1px solid var(--border);color:var(--dim);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;transition:all .15s}
.date-range button:hover{color:var(--text);border-color:var(--dim)}
.date-range button.active{background:var(--blue);color:white;border-color:var(--blue)}
.date-range input[type="date"]{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-size:11px;cursor:pointer}
.date-range input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.5)}
.date-range .date-sep{color:var(--dim);font-size:11px}

.chart-container{height:200px;position:relative}
.chart-bar{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:flex-end;gap:2px;height:100%;padding:0 2px}
.chart-bar .bar{flex:1;background:var(--blue);border-radius:2px 2px 0 0;transition:height .5s ease;min-height:2px;position:relative;cursor:pointer}
.chart-bar .bar:hover{opacity:0.8}
.chart-bar .bar .tooltip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);padding:6px 10px;border-radius:4px;font-size:11px;white-space:nowrap;z-index:10;pointer-events:none}
.chart-bar .bar:hover .tooltip{display:block}
.chart-labels{display:flex;justify-content:space-between;margin-top:8px;font-size:10px;color:var(--dim);padding:0 2px}

.section{margin-bottom:16px}
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.section-title{font-size:13px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}

.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow-x:auto;position:relative}
.table-wrap::before{content:'';position:absolute;top:0;right:0;bottom:0;width:20px;background:linear-gradient(to right,transparent,var(--card));pointer-events:none;z-index:2;opacity:0;transition:opacity 0.3s}
.table-wrap.scrollable::before{opacity:1}
.table-wrap.scrolled-end::before{opacity:0}
.table-wrap.scrolled::after{opacity:0}
table{width:100%;border-collapse:collapse;min-width:1100px}
thead{background:var(--bg);position:sticky;top:0;z-index:1}
th{padding:8px 12px;text-align:left;font-weight:500;color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:8px 12px;border-bottom:1px solid var(--border);white-space:nowrap;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#1a1e2e}
.num{text-align:right;font-variant-numeric:tabular-nums}
.mono{font-family:'SF Mono',Consolas,'Liberation Mono',monospace;font-size:12px}

/* 移动端隐藏次要列 */
@media(max-width:768px){
  .hide-mobile{display:none}
}

.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.badge-ok{background:#22c55e18;color:var(--green)}
.badge-stream{background:#3b82f618;color:var(--blue)}
.badge-fail{background:#ef444418;color:var(--red)}

.token-bar{display:flex;gap:2px;height:4px;border-radius:2px;overflow:hidden;margin-top:3px}
.token-bar .inp{background:var(--blue)}
.token-bar .out{background:var(--purple)}
.token-bar .cache{background:var(--cyan)}

.cache-pct{color:var(--cyan);font-size:11px}
.cost{color:var(--yellow)}

.empty{text-align:center;color:var(--dim);padding:30px;font-size:13px}

.budget-section{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
@media(max-width:800px){.budget-section{grid-template-columns:1fr}}
.budget-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
.budget-card .budget-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.budget-card .budget-title{font-size:13px;font-weight:600}
.budget-card .budget-limit{display:flex;align-items:center;gap:6px}
.budget-card .budget-limit input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;width:80px;font-size:12px;text-align:right}
.budget-card .budget-amounts{display:flex;justify-content:space-between;margin-bottom:8px;font-size:12px}
.budget-card .budget-spent{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
.budget-card .budget-remaining{color:var(--dim);font-size:12px;margin-bottom:10px}
.budget-bar{height:10px;background:var(--border);border-radius:5px;overflow:hidden;margin-bottom:6px}
.budget-bar .budget-fill{height:100%;border-radius:5px;transition:width .5s ease}
.budget-bar .budget-fill.normal{background:var(--green)}
.budget-bar .budget-fill.warning{background:var(--yellow)}
.budget-bar .budget-fill.danger{background:var(--red)}
.budget-pct{font-size:11px;color:var(--dim);text-align:right}
.budget-actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
.budget-actions button{background:var(--bg);border:1px solid var(--border);color:var(--dim);padding:4px 12px;border-radius:4px;cursor:pointer;font-size:11px;transition:all .15s}
.budget-actions button:hover{color:var(--text);border-color:var(--dim)}
.budget-actions button.save{background:var(--blue);color:white;border-color:var(--blue)}

.alert{position:fixed;top:20px;right:20px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;display:none;z-index:100;max-width:300px}
.alert.show{display:block;animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.alert .alert-title{font-size:13px;font-weight:600;margin-bottom:4px}
.alert .alert-msg{font-size:12px;color:var(--dim)}
.alert .alert-close{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px}
.alert.alert-warn{border-color:var(--yellow);box-shadow:0 0 12px #eab30830}
.alert.alert-critical{border-color:#f97316;box-shadow:0 0 12px #f9731630}
.alert.alert-max{border-color:var(--red);box-shadow:0 0 12px #ef444440;animation:slideIn .3s ease,alertPulse 1.5s ease-in-out infinite}
@keyframes alertPulse{0%,100%{box-shadow:0 0 12px #ef444440}50%{box-shadow:0 0 24px #ef444480}}

.alert-badge{position:relative;display:inline-flex;align-items:center;gap:4px}
.alert-badge .count{position:absolute;top:-6px;right:-8px;background:var(--red);color:white;font-size:10px;font-weight:700;padding:1px 5px;border-radius:10px;min-width:16px;text-align:center}
.alert-badge.has-alerts{color:var(--yellow)}

.alert-panel{position:fixed;top:0;right:0;width:380px;height:100vh;background:var(--card);border-left:1px solid var(--border);z-index:200;transform:translateX(100%);transition:transform .3s ease;display:flex;flex-direction:column}
.alert-panel.open{transform:translateX(0)}
.alert-panel-header{padding:16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.alert-panel-header h3{font-size:14px;font-weight:600}
.alert-panel-body{flex:1;overflow-y:auto;padding:12px}
.alert-panel-footer{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px}
.alert-panel-footer button{flex:1;padding:6px;border:1px solid var(--border);background:var(--bg);color:var(--dim);border-radius:4px;cursor:pointer;font-size:11px}
.alert-panel-footer button:hover{color:var(--text);border-color:var(--dim)}

.alert-item{padding:10px 12px;margin-bottom:8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);position:relative;transition:all .2s}
.alert-item:hover{border-color:var(--dim)}
.alert-item .alert-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.alert-item .alert-level{font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;text-transform:uppercase}
.alert-item .alert-level.warn{background:#eab30820;color:var(--yellow)}
.alert-item .alert-level.critical{background:#f9731620;color:#f97316}
.alert-item .alert-level.max{background:#ef444420;color:var(--red)}
.alert-item .alert-time{font-size:10px;color:var(--dim)}
.alert-item .alert-detail{font-size:12px;color:var(--text);line-height:1.4}
.alert-item .alert-meta{font-size:10px;color:var(--dim);margin-top:4px}
.alert-item.acknowledged{opacity:0.5}
.alert-item .ack-btn{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;opacity:0;transition:opacity .2s}
.alert-item:hover .ack-btn{opacity:1}

.alert-config-section{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
.alert-config-section .config-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-top:12px}
.alert-config-section .config-item{display:flex;flex-direction:column;gap:4px}
.alert-config-section .config-item label{font-size:11px;color:var(--dim)}
.alert-config-section .config-item input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:4px;font-size:12px}
.alert-config-section .config-item input[type="checkbox"]{width:16px;height:16px;accent-color:var(--blue)}
.alert-config-actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
.alert-config-actions button{padding:6px 16px;border:1px solid var(--border);background:var(--bg);color:var(--dim);border-radius:4px;cursor:pointer;font-size:11px}
.alert-config-actions button.primary{background:var(--blue);color:white;border-color:var(--blue)}

.compare-section{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
.compare-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.compare-title{font-size:13px;font-weight:600;color:var(--dim)}
.swipe-hint{display:none;text-align:center;padding:8px;font-size:11px;color:var(--dim);border-bottom:1px solid var(--border);margin-bottom:12px;user-select:none;animation:swipeHint 2s ease-in-out infinite;transition:opacity 0.3s ease}
@keyframes swipeHint{0%,100%{opacity:0.5}50%{opacity:1}}
@media(max-width:600px){.swipe-hint{display:block}}
.chart-type-btns{display:flex;gap:4px}
.chart-type-btns button{background:var(--bg);border:1px solid var(--border);color:var(--dim);padding:4px 12px;border-radius:4px;cursor:pointer;font-size:11px;transition:all .15s}
.chart-type-btns button:hover{color:var(--text);border-color:var(--dim)}
.chart-type-btns button.active{background:var(--blue);color:white;border-color:var(--blue)}

.compare-body{min-height:280px;position:relative}

.bar-chart{display:flex;gap:24px;align-items:flex-end;justify-content:center;height:240px;padding:0 20px}
.bar-group{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;max-width:200px}
.bar-group-label{font-size:11px;color:var(--dim);font-weight:600;margin-bottom:4px}
.bar-group-bars{display:flex;gap:4px;align-items:flex-end;height:200px}
.bar-column{display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-col-fill{width:36px;border-radius:4px 4px 0 0;transition:height .5s ease;cursor:pointer;position:relative;min-height:2px}
.bar-col-fill:hover{opacity:0.85}
.bar-col-fill .bar-tip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);padding:6px 10px;border-radius:4px;font-size:11px;white-space:nowrap;z-index:10;pointer-events:none}
.bar-col-fill:hover .bar-tip{display:block}
.bar-col-label{font-size:10px;color:var(--dim);white-space:nowrap}
.bar-legend{display:flex;gap:16px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.bar-legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--dim)}
.bar-legend-dot{width:10px;height:10px;border-radius:2px}

.pie-chart-wrap{display:flex;align-items:center;justify-content:center;gap:40px;height:260px;flex-wrap:wrap}
.pie-svg{width:220px;height:220px}
.pie-legend{display:flex;flex-direction:column;gap:8px}
.pie-legend-item{display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer;transition:opacity .2s}
.pie-legend-item:hover{opacity:0.8}
.pie-legend-color{width:14px;height:14px;border-radius:3px;flex-shrink:0}
.pie-legend-text{display:flex;flex-direction:column}
.pie-legend-name{font-weight:500}
.pie-legend-val{font-size:10px;color:var(--dim)}

.line-chart-wrap{position:relative;height:260px;padding:10px 0}
.line-chart-svg{width:100%;height:100%}
.line-legend{display:flex;gap:16px;justify-content:center;margin-top:8px;flex-wrap:wrap}
.line-legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--dim)}
.line-legend-line{width:20px;height:3px;border-radius:2px}

.compare-metric-btns{display:flex;gap:4px;margin-right:12px}
.compare-metric-btns button{background:var(--bg);border:1px solid var(--border);color:var(--dim);padding:3px 10px;border-radius:4px;cursor:pointer;font-size:10px;transition:all .15s}
.compare-metric-btns button:hover{color:var(--text);border-color:var(--dim)}
.compare-metric-btns button.active{background:var(--cyan);color:white;border-color:var(--cyan)}

@media(max-width:900px){.stats-row{grid-template-columns:repeat(3,1fr)}.pie-chart-wrap{flex-direction:column;gap:16px}}
@media(max-width:600px){
  .stats-row{grid-template-columns:1fr}
  .stat .value{font-size:18px}
  .bar-chart{gap:12px}
  .header{flex-direction:column;gap:12px;align-items:flex-start}
  .header-actions{width:100%;justify-content:space-between}
  .header-actions button{min-height:44px;padding:8px 16px;font-size:14px}
  .prov-stats{grid-template-columns:repeat(2,1fr)}
  .prov-card .model-row .bar-wrap{width:60px}
  .prov-card .model-row .right{min-width:80px;font-size:11px}
  .date-range{flex-wrap:wrap;gap:8px}
  .date-range button{min-height:44px;padding:8px 16px;font-size:13px}
  .chart-container{height:150px}
  .compare-header{flex-direction:column;align-items:flex-start}
  .compare-metric-btns{margin-right:0;margin-bottom:8px}
  .compare-metric-btns button{min-height:44px;padding:8px 16px;font-size:13px}
  .chart-type-btns button{min-height:44px;padding:8px 16px;font-size:13px}
  .budget-section{grid-template-columns:1fr}
  .budget-card .budget-head{flex-direction:column;gap:8px;align-items:flex-start}
  .budget-card .budget-limit{width:100%}
  .budget-card .budget-limit input{width:100%;text-align:left}
  .budget-actions{justify-content:stretch}
  .budget-actions button{flex:1;min-height:44px}
  .table-wrap{margin:0 -20px;width:calc(100% + 40px);border-radius:0}
  .table-wrap::after{content:'← 横向滚动查看更多 →';display:block;text-align:center;padding:8px;font-size:11px;color:var(--dim);background:var(--card);position:sticky;left:0;animation:scrollHint 2s ease-in-out infinite;transition:opacity 0.3s}
  .table-wrap.scrolled::after{opacity:0}
  @keyframes scrollHint{0%,100%{opacity:0.5}50%{opacity:1}}
  .section-head{flex-direction:column;gap:8px;align-items:flex-start}
  .alert-panel{width:100%}
  .alert-config-section .config-grid{grid-template-columns:1fr}
  .bar-group{max-width:none}
  .bar-col-fill{width:32px}
  .line-chart-wrap{height:200px}
  .pie-chart-wrap{flex-direction:column;gap:16px}
  .pie-svg{width:180px;height:180px}
}
@media(max-width:400px){
  body{padding:12px;font-size:12px}
  .stat .value{font-size:16px}
  .prov-card .prov-stats{grid-template-columns:1fr}
  .prov-card .model-row{flex-direction:column;align-items:flex-start;gap:4px}
  .prov-card .model-row .right{text-align:left}
}

/* 移动端菜单样式 */
.mobile-menu-btn {
  display: none;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--dim);
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
  min-height: 44px;
  min-width: 44px;
}

.mobile-menu-btn:hover {
  color: var(--text);
  border-color: var(--dim);
}

@media(max-width:600px){
  .mobile-menu-btn {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .header-actions {
    display: none;
    width: 100%;
    flex-direction: column;
    gap: 8px;
    padding: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-top: 8px;
  }
  
  .header-actions.mobile-menu-open {
    display: flex;
  }
  
  .header-actions button {
    width: 100%;
    justify-content: center;
  }
}

/* 触摸友好的交互元素 */

let lang=localStorage.getItem('lang')||'zh';
let currentRange='today';
let lastAlertTime=0;
let alertPanelOpen=false;
let alertSoundEnabled=true;
let lastUnackCount=0;
const TOKEN_LIMIT=1000000;

function t(k){return(I18N[lang]||I18N.zh)[k]||k}
function fmt(n){if(n==null)return'-';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return String(n)}
function colorClass(p){return p==='MiMo'?'background:var(--blue)':p==='Claude'?'background:var(--cyan)':'background:var(--purple)'}

function showAlert(title,msg,level){
  const el=document.getElementById('alert');
  document.getElementById('alert-title').textContent=title;
  document.getElementById('alert-msg').textContent=msg;
  el.className='alert show'+(level==='max'?' alert-max':level==='critical'?' alert-critical':level==='warn'?' alert-warn':'');
  setTimeout(()=>{el.classList.remove('show','alert-warn','alert-critical','alert-max')},5000);
}
function closeAlert(){document.getElementById('alert').classList.remove('show')}

function setLang(l){
  lang=l;localStorage.setItem('lang',l);
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));
  document.querySelectorAll('t[k]').forEach(el=>el.textContent=t(el.getAttribute('k')));
  document.getElementById('btn-zh').classList.toggle('active',l==='zh');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  document.title=t('title');
  loadBudget();
  load();
  if(compareData)renderCompareChart();
}

function setRange(range){
  currentRange=range;
  // 更新按钮状态
  document.querySelectorAll('.date-range button').forEach(btn=>btn.classList.remove('active'));
  document.getElementById('range-'+range).classList.add('active');
  // 显示/隐藏日期选择器
  const dateInputs=document.querySelectorAll('.date-range input[type="date"],.date-range .date-sep');
  dateInputs.forEach(el=>el.style.display=range==='custom'?'':'none');
  if(range!=='custom'){
    load();
  }
}

function applyCustomRange(){
  const start=document.getElementById('start-date').value;
  const end=document.getElementById('end-date').value;
  if(start&&end){
    load();
  }
}

function getDayName(dateStr){
  if(!dateStr)return'';
  const days_cn=['周日','周一','周二','周三','周四','周五','周六'];
  const days_en=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const d=new Date(dateStr);
  return lang==='zh'?days_cn[d.getDay()]:days_en[d.getDay()];
}

async function loadBudget(){
  try{
    const r=await fetch('/api/budget');
    const d=await r.json();
    document.getElementById('budget-daily-input').value=d.daily.limit.toFixed(2);
    document.getElementById('budget-monthly-input').value=d.monthly.limit.toFixed(2);
    renderBudget('daily',d.daily);
    renderBudget('monthly',d.monthly);
    if(d.daily.percent>=80||d.monthly.percent>=80){
      showAlert(t('alertTitle'),d.daily.percent>=100||d.monthly.percent>=100?t('budgetExceeded'):t('budgetWarn'));
    }
  }catch{}
}

function renderBudget(type,data){
  document.getElementById(type+'-spent').textContent='$'+data.spent.toFixed(2);
  document.getElementById(type+'-remaining').textContent='$'+data.remaining.toFixed(2);
  const pct=Math.min(100,data.percent);
  const bar=document.getElementById(type+'-bar');
  bar.style.width=pct+'%';
  bar.className='budget-fill '+(pct>=100?'danger':pct>=80?'warning':'normal');
  document.getElementById(type+'-pct').textContent=data.percent.toFixed(1)+'%';
}

async function saveBudget(){
  const daily=parseFloat(document.getElementById('budget-daily-input').value)||0;
  const monthly=parseFloat(document.getElementById('budget-monthly-input').value)||0;
  try{
    await fetch('/api/budget',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({daily_limit:daily,monthly_limit:monthly})});
    showAlert(t('saveBudget'),t('budgetSaved'));
    loadBudget();
  }catch{}
}

function playAlertSound(level){
  if(!alertSoundEnabled)return;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type='sine';
    osc.frequency.value=level==='max'?880:level==='critical'?660:440;
    gain.gain.value=0.15;
    osc.start();osc.stop(ctx.currentTime+0.2);
    if(level==='max'){
      const osc2=ctx.createOscillator();
      osc2.connect(gain);
      osc2.type='sine';osc2.frequency.value=1100;
      osc2.start(ctx.currentTime+0.25);osc2.stop(ctx.currentTime+0.45);
    }
  }catch{}
}

function toggleAlertPanel(){
  alertPanelOpen=!alertPanelOpen;
  document.getElementById('alert-panel').classList.toggle('open',alertPanelOpen);
  if(alertPanelOpen)loadAlerts();
}

function showAlertConfig(){
  fetch('/api/alerts?action=config').then(r=>r.json()).then(cfg=>{
    document.getElementById('cfg-warn').value=cfg.warn_threshold;
    document.getElementById('cfg-critical').value=cfg.critical_threshold;
    document.getElementById('cfg-max').value=cfg.max_threshold;
    document.getElementById('cfg-interval').value=cfg.check_interval_sec;
    document.getElementById('cfg-sound').checked=!!cfg.sound_enabled;
    document.getElementById('alert-config-modal').style.display='flex';
  });
}

function closeAlertConfig(){document.getElementById('alert-config-modal').style.display='none'}

async function saveAlertConfig(){
  const params=new URLSearchParams({
    warn:document.getElementById('cfg-warn').value,
    critical:document.getElementById('cfg-critical').value,
    max:document.getElementById('cfg-max').value,
    interval:document.getElementById('cfg-interval').value,
    sound:document.getElementById('cfg-sound').checked?'1':'0',
    action:'update'
  });
  await fetch('/api/alerts?'+params);
  alertSoundEnabled=document.getElementById('cfg-sound').checked;
  closeAlertConfig();
  showAlert(t('alertConfig'),t('configSaved'));
}

async function ackAlert(id){
  await fetch('/api/alerts?action=ack&id='+id);
  loadAlerts();
}

async function ackAllAlerts(){
  await fetch('/api/alerts?action=ack_all');
  loadAlerts();
}

async function loadAlerts(){
  try{
    const r=await fetch('/api/alerts?limit=50');
    const d=await r.json();
    const body=document.getElementById('alert-panel-body');
    const empty=document.getElementById('alert-empty');
    if(!d.alerts||d.alerts.length===0){
      body.innerHTML=`<div class="empty">${t('noAlerts')}</div>`;
      return;
    }
    body.innerHTML=d.alerts.map(a=>{
      const levelCls=a.level==='max'?'max':a.level==='critical'?'critical':'warn';
      const levelLabel=a.level==='max'?t('levelMax'):a.level==='critical'?t('levelCritical'):t('levelWarn');
      const pct=a.threshold>0?((a.current_value/a.threshold)*100).toFixed(1):'0';
      return`<div class="alert-item ${a.acknowledged?'acknowledged':''}">
        <button class="ack-btn" onclick="ackAlert(${a.id})" title="${t('ack')}">&#10003;</button>
        <div class="alert-item-header">
          <span class="alert-level ${levelCls}">${levelLabel}</span>
          <span class="alert-time">${a.ts||''}</span>
        </div>
        <div class="alert-detail">${a.message||''}</div>
        <div class="alert-meta">${a.provider?a.provider+'/'+a.model:a.type} · ${pct}%</div>
      </div>`;
    }).join('');
  }catch{}
}

async function checkNewAlerts(){
  try{
    const r=await fetch('/api/alerts?action=list&unack=1&limit=5');
    const d=await r.json();
    const count=d.unack_count||0;
    const badge=document.getElementById('alert-count');
    const bell=document.getElementById('alert-bell');
    if(count>0){
      badge.style.display='';
      badge.textContent=count>99?'99+':count;
      bell.classList.add('has-alerts');
      if(count>lastUnackCount&&d.alerts&&d.alerts.length>0){
        const latest=d.alerts[0];
        const levelCls=latest.level==='max'?'alert-max':latest.level==='critical'?'alert-critical':'alert-warn';
        const el=document.getElementById('alert');
        el.className='alert show '+levelCls;
        document.getElementById('alert-title').textContent=t('alertTitle');
        document.getElementById('alert-msg').textContent=latest.message||'';
        playAlertSound(latest.level);
        setTimeout(()=>el.classList.remove('show','alert-warn','alert-critical','alert-max'),6000);
      }
    }else{
      badge.style.display='none';
      bell.classList.remove('has-alerts');
    }
    lastUnackCount=count;
  }catch{}
}

function drawChart(data,isHourly){
  const container=document.getElementById('chart-container');
  const labels=document.getElementById('chart-labels');
  if(!data||data.length===0){
    container.innerHTML=`<div class="empty">${t('noReqs')}</div>`;
    labels.innerHTML='';
    return;
  }
  
  const maxVal=Math.max(...data.map(d=>d.tokens),1);
  const barWidth=100/data.length;
  
  let barsHtml='<div class="chart-bar">';
  data.forEach((d,i)=>{
    const height=Math.max(2,(d.tokens/maxVal)*100);
    const label=isHourly?d.date+':00':d.date;
    const dayName=isHourly?'':getDayName(d.date);
    
    // 模型明细
    let modelDetails='';
    if(d.models&&Object.keys(d.models).length>0){
      const sorted=Object.entries(d.models).sort((a,b)=>b[1]-a[1]);
      modelDetails=sorted.map(([name,tok])=>`<div style="margin-top:3px"><span style="color:var(--dim)">${name}:</span> ${fmt(tok)}</div>`).join('');
    }
    
    barsHtml+=`<div class="bar" style="height:${height}%;width:${barWidth}%">
      <div class="tooltip">
        <div style="font-weight:600;margin-bottom:4px">${label}${dayName?' ('+dayName+')':''}</div>
        <div>${fmt(d.tokens)} tokens · ${d.count} ${lang==='zh'?'次请求':'req'}</div>
        ${d.cached?`<div style="color:var(--cyan)">${lang==='zh'?'缓存':'cached'}: ${fmt(d.cached)}</div>`:''}
        ${modelDetails}
      </div>
    </div>`;
  });
  barsHtml+='</div>';
  
  container.innerHTML=barsHtml;
  
  // 标签
  if(data.length>0){
    const maxLabels=7;
    const step=Math.max(1,Math.floor(data.length/maxLabels));
    let labelsHtml='';
    for(let i=0;i<data.length;i+=step){
      const d=data[i];
      labelsHtml+=`<span>${isHourly?d.date+':00':d.date.slice(5)}</span>`;
    }
    if(data.length>1){
      const last=data[data.length-1];
      if(!labelsHtml.includes(isHourly?last.date+':00':last.date.slice(5))){
        labelsHtml+=`<span>${isHourly?last.date+':00':last.date.slice(5)}</span>`;
      }
    }
    labels.innerHTML=labelsHtml;
  }
}

async function load(){
  let url='/api/stats';
  if(currentRange==='custom'){
    const start=document.getElementById('start-date').value;
    const end=document.getElementById('end-date').value;
    if(start&&end){
      url+=`?range=custom&start=${start}&end=${end}`;
    }else{
      return; // 未选择日期不加载
    }
  }else{
    url+=`?range=${currentRange}`;
  }
  
  const r=await fetch(url);
  const d=await r.json();
  const s=d.summary||{};
  const today=d.todaySummary||{};

  // 统计卡片
  const avgLatency=s.cnt?Math.round(s.latency/s.cnt):0;
  
  document.getElementById('stats-row').innerHTML=`
    <div class="stat"><div class="label">${t('totalReqs')}</div><div class="value">${fmt(s.cnt)}</div><div class="trend up">↑ ${fmt(today.cnt)} ${t('todayReqs')}</div></div>
    <div class="stat"><div class="label">${t('totalTokens')}</div><div class="value">${fmt(s.tok)}</div><div class="sub">${t('cached')}: ${fmt(s.cached)}</div></div>
    <div class="stat"><div class="label">${t('todayTokens')}</div><div class="value">${fmt(today.tok)}</div><div class="sub">${t('cached')}: ${fmt(today.cached)}</div></div>
    <div class="stat"><div class="label">${t('totalCost')}</div><div class="value">${s.cost?'$'+s.cost.toFixed(2):'-'}</div><div class="sub">${today.cost?'$'+today.cost.toFixed(2):'-'} ${t('todayReqs')}</div></div>
    <div class="stat"><div class="label">${t('avgLatency')}</div><div class="value">${avgLatency}ms</div></div>

  // Provider 卡片
  const byModel=d.byModel||[];
  const maxTok=Math.max(...byModel.map(m=>m.tok),1);
  
  document.getElementById('providers').innerHTML=(d.providers||[]).map(p=>{
    const provModels=byModel.filter(m=>m.provider===p.name);
    const totalTok=provModels.reduce((a,m)=>a+m.tok,0);
    const totalCnt=provModels.reduce((a,m)=>a+m.cnt,0);
    const usagePct=((totalTok/TOKEN_LIMIT)*100).toFixed(1);
    
    return`<div class="prov-card">
      <div class="head">
        <span class="name">${p.name}</span>

      </div>
      <div class="prov-stats">
        <div class="prov-stat"><div class="val">${fmt(totalTok)}</div><div class="lbl">${t('tokenUsed')}</div></div>
        <div class="prov-stat"><div class="val">${totalCnt}</div><div class="lbl">${t('totalReqs')}</div></div>
        <div class="prov-stat"><div class="val">${usagePct}%</div><div class="lbl">${t('usage')}</div></div>
      </div>
      <div class="models">${p.models.map(mid=>{
        const m=byModel.find(x=>x.model===mid&&x.provider===p.name);
        const tok=m?m.tok:0;
        const cnt=m?m.cnt:0;
        const pct=Math.max(1,(tok/maxTok)*100).toFixed(0);
        return`<div class="model-row">
          <div class="left"><span class="model-name">${mid}</span><div class="bar-wrap"><div class="bar-fill" style="${colorClass(p.name)};width:${pct}%"></div></div></div>
          <div class="right">${fmt(tok)} tok / ${cnt} req</div>
        </div>`
      }).join('')}</div>
      ${p.lastError?`<div class="last-error">${t('lastError')}: ${p.lastError}</div>`:''}
    </div>`
  }).join('');

  // 趋势图
  const dailyStats=d.dailyStats||[];
  const isHourly=d.range==='today';
  drawChart(dailyStats,isHourly);

  // 告警检查
  if(today.tok>TOKEN_LIMIT*0.8&&Date.now()-lastAlertTime>300000){
    showAlert(t('alertTitle'),t('quotaWarning'));
    lastAlertTime=Date.now();
  }

  // 请求表格
  const recent=d.recent||[];
  document.getElementById('req-count').textContent=`${recent.length} ${lang==='zh'?'条记录':'records'}`;
  document.getElementById('tbody').innerHTML=recent.length?recent.map((r,i)=>{
    const inpPct=r.total_tokens?((r.input_tokens/r.total_tokens)*100).toFixed(0):0;
    const outPct=r.total_tokens?((r.output_tokens/r.total_tokens)*100).toFixed(0):0;
    const cachePct=r.total_tokens&&r.cache_read?((r.cache_read/r.total_tokens)*100).toFixed(1):'';
    return`<tr>
      <td class="mono" style="color:var(--dim)">#${String(recent.length-i).padStart(6,'0')}</td>
      <td class="mono" style="color:var(--dim);font-size:11px">${r.request_id||'-'}</td>
      <td><span style="font-weight:500">${r.model}</span></td>
      <td class="hide-mobile">${r.stream?`<span class="badge badge-stream">${t('stream')}</span>`:`<span style="color:var(--dim)">${t('nonStream')}</span>`}</td>
      <td class="hide-mobile" style="color:var(--dim)">${r.source||'API'}</td>
      <td class="hide-mobile mono" style="color:var(--dim);font-size:11px">${r.client_ip||'-'}</td>
      <td class="hide-mobile" style="color:var(--dim)">${r.channel||'-'}</td>
      <td>${r.provider||'-'}</td>
      <td><span class="badge ${r.status==='ok'?'badge-ok':'badge-fail'}">${r.status==='ok'?t('ok'):t('fail')}</span></td>
      <td>
        <div style="font-variant-numeric:tabular-nums"><span style="color:var(--dim)">${t('total')}:</span> ${fmt(r.total_tokens)}</div>
        <div style="font-size:11px;color:var(--dim)">${t('input')}: ${fmt(r.input_tokens)} | ${t('output')}: ${fmt(r.output_tokens)}</div>
        <div class="token-bar"><div class="inp" style="width:${inpPct}%"></div><div class="out" style="width:${outPct}%"></div></div>
      </td>
      <td class="hide-mobile num">${r.cache_read?`<span class="cache-pct">${fmt(r.cache_read)}</span><br><span class="cache-pct" style="font-size:10px">${cachePct}% ${t('cacheHit')}</span>`:'<span style="color:var(--dim)">-</span>'}</td>
      <td class="num">${r.cost?`<span class="cost">$${r.cost.toFixed(4)}</span>`:'<span style="color:var(--dim)">-</span>'}</td>
      <td class="num" style="font-variant-numeric:tabular-nums">${r.latency_ms?`${(r.latency_ms/1000).toFixed(1)}s`:'-'}${r.ttft_ms?`<br><span style="font-size:10px;color:var(--dim)">TTFT: ${(r.ttft_ms/1000).toFixed(1)}s</span>`:''}</td>
      <td class="hide-mobile" style="color:var(--dim);font-size:12px">${r.ts||'-'}</td>
    </tr>`
  }).join(''):`<tr><td colspan="14" class="empty">${t('noReqs')}</td></tr>`;

// ─── Provider 对比图表 ─────────────────────────────────────────────
const PROVIDER_COLORS={MiMo:'#3b82f6',MiniMax:'#a855f7',Claude:'#06b6d4',Alibaba:'#ff6a00'};
let compareData=null;
let compareRange='today';
let compareMetric='tokens';
let chartType='bar';

function setCompareRange(r){
  compareRange=r;
  document.querySelectorAll('#compare-range button').forEach(b=>b.classList.remove('active'));
  document.getElementById('cmp-range-'+r).classList.add('active');
  loadCompare();
}
function setCompareMetric(m){
  compareMetric=m;
  document.querySelectorAll('.compare-metric-btns button').forEach(b=>b.classList.remove('active'));
  document.getElementById('cmp-'+m).classList.add('active');
  renderCompareChart();
}
function setChartType(t){
  chartType=t;
  document.querySelectorAll('.chart-type-btns button').forEach(b=>b.classList.remove('active'));
  document.getElementById('chart-'+t).classList.add('active');
  renderCompareChart();
}

async function loadCompare(){
  try{
    const r=await fetch('/api/compare?range='+compareRange);
    compareData=await r.json();
    renderCompareChart();
  }catch{}
}

function getMetricVal(p){
  if(compareMetric==='tokens')return p.tok||0;
  if(compareMetric==='requests')return p.cnt||0;
  if(compareMetric==='cost')return p.cost||0;
  return 0;
}
function getMetricLabel(){
  if(compareMetric==='tokens')return t('cmpTokenUsed');
  if(compareMetric==='requests')return t('cmpReqCount');
  if(compareMetric==='cost')return t('cmpCostVal');
  return '';
}
function fmtMetric(v){
  if(compareMetric==='cost')return'$'+v.toFixed(4);
  return fmt(v);
}

function renderCompareChart(){
  if(!compareData)return;
  const body=document.getElementById('compare-body');
  if(chartType==='bar')renderBarChart(body);
  else if(chartType==='pie')renderPieChart(body);
  else if(chartType==='line')renderLineChart(body);
}

function renderBarChart(body){
  const ps=compareData.providerSummary||[];
  if(!ps.length){body.innerHTML='<div class="empty">'+t('noReqs')+'</div>';return;}
  const maxVal=Math.max(...ps.map(p=>getMetricVal(p)),1);

  let html='<div class="bar-chart">';
  ps.forEach(p=>{
    const val=getMetricVal(p);
    const pct=Math.max(2,(val/maxVal)*100);
    const color=PROVIDER_COLORS[p.provider]||'#666';
    html+=`<div class="bar-group">
      <div class="bar-group-label">${p.provider}</div>
      <div class="bar-col-fill" style="height:${pct}%;background:${color};width:48px">
        <div class="bar-tip">
          <div style="font-weight:600;margin-bottom:3px">${p.provider}</div>
          <div>${t('cmpTokenUsed')}: ${fmt(p.tok)}</div>
          <div>${t('cmpReqCount')}: ${p.cnt}</div>
          <div>${t('cmpCostVal')}: $${(p.cost||0).toFixed(4)}</div>
          <div>${t('cmpAvgLatency')}: ${Math.round(p.avg_latency||0)}ms</div>
        </div>
      </div>
      <div class="bar-col-label">${fmtMetric(val)}</div>
    </div>`;
  });
  html+='</div>';

  // 图例
  html+='<div class="bar-legend">';
  html+=`<div class="bar-legend-item"><div class="bar-legend-dot" style="background:var(--blue)"></div>${t('cmpTokenUsed')}</div>`;
  html+='<div class="bar-legend-item">'+getMetricLabel()+'</div>';
  html+='</div>';
  body.innerHTML=html;
}

function renderPieChart(body){
  const ms=compareData.modelSummary||[];
  if(!ms.length){body.innerHTML='<div class="empty">'+t('noReqs')+'</div>';return;}
  const total=ms.reduce((a,m)=>a+getMetricVal(m),0);
  if(total===0){body.innerHTML='<div class="empty">'+t('noReqs')+'</div>';return;}

  const sorted=[...ms].sort((a,b)=>getMetricVal(b)-getMetricVal(a));
  const colors=['#3b82f6','#a855f7','#06b6d4','#22c55e','#eab308','#ef4444','#f97316','#ec4899'];

  // SVG pie
  let cumulative=0;
  let paths='';
  sorted.forEach((m,i)=>{
    const val=getMetricVal(m);
    const pct=val/total;
    const startAngle=cumulative*2*Math.PI;
    cumulative+=pct;
    const endAngle=cumulative*2*Math.PI;
    const largeArc=pct>0.5?1:0;
    const x1=110+100*Math.sin(startAngle);
    const y1=110-100*Math.cos(startAngle);
    const x2=110+100*Math.sin(endAngle);
    const y2=110-100*Math.cos(endAngle);
    const color=colors[i%colors.length];
    if(pct>=0.999){
      paths+=`<circle cx="110" cy="110" r="100" fill="${color}"><title>${m.provider}/${m.model}: ${fmtMetric(val)} (${(pct*100).toFixed(1)}%)</title></circle>`;
    }else{
      paths+=`<path d="M110,110 L${x1},${y1} A100,100 0 ${largeArc},1 ${x2},${y2} Z" fill="${color}"><title>${m.provider}/${m.model}: ${fmtMetric(val)} (${(pct*100).toFixed(1)}%)</title></path>`;
    }
  });

  let legend='';
  sorted.forEach((m,i)=>{
    const val=getMetricVal(m);
    const pct=(val/total*100).toFixed(1);
    const color=colors[i%colors.length];
    legend+=`<div class="pie-legend-item">
      <div class="pie-legend-color" style="background:${color}"></div>
      <div class="pie-legend-text">
        <span class="pie-legend-name">${m.provider}/${m.model}</span>
        <span class="pie-legend-val">${fmtMetric(val)} (${pct}%)</span>
      </div>
    </div>`;
  });

  body.innerHTML=`<div class="pie-chart-wrap">
    <svg class="pie-svg" viewBox="0 0 220 220">${paths}</svg>
    <div class="pie-legend">${legend}</div>
  </div>`;
}

function renderLineChart(body){
  const trends=compareData.trends||[];
  const providers=compareData.providerSummary||[];
  if(!trends.length||!providers.length){body.innerHTML='<div class="empty">'+t('noReqs')+'</div>';return;}

  const provNames=providers.map(p=>p.provider);
  const allVals=[];
  trends.forEach(t=>{provNames.forEach(n=>{const d=t.data[n];allVals.push(d?getMetricVal(d):0);});});
  const maxVal=Math.max(...allVals,1);

  const W=700,H=240,padL=50,padR=20,padT=20,padB=30;
  const chartW=W-padL-padR;
  const chartH=H-padT-padB;
  const stepX=trends.length>1?chartW/(trends.length-1):chartW;

  // Grid lines
  let gridLines='';
  for(let i=0;i<=4;i++){
    const y=padT+chartH*(1-i/4);
    const val=maxVal*i/4;
    gridLines+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#2a2d3a" stroke-width="1"/>`;
    gridLines+=`<text x="${padL-6}" y="${y+4}" fill="#71717a" font-size="10" text-anchor="end">${fmtMetric(val)}</text>`;
  }

  // X labels
  let xLabels='';
  const labelStep=Math.max(1,Math.floor(trends.length/8));
  trends.forEach((t,i)=>{
    if(i%labelStep===0||i===trends.length-1){
      const x=padL+i*stepX;
      xLabels+=`<text x="${x}" y="${H-4}" fill="#71717a" font-size="10" text-anchor="middle">${t.period}</text>`;
    }
  });

  // Lines
  let lines='';
  let dots='';
  provNames.forEach((name,pi)=>{
    const color=PROVIDER_COLORS[name]||'#666';
    let points=[];
    trends.forEach((t,i)=>{
      const d=t.data[name];
      const val=d?getMetricVal(d):0;
      const x=padL+i*stepX;
      const y=padT+chartH*(1-val/maxVal);
      points.push(`${x},${y}`);
      dots+=`<circle cx="${x}" cy="${y}" r="3" fill="${color}" stroke="var(--card)" stroke-width="1.5"><title>${name} | ${t.period}: ${fmtMetric(val)}</title></circle>`;
    });
    if(points.length>1){
      lines+=`<polyline points="${points.join(' ')}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
    }
  });

  let legend='';
  provNames.forEach(name=>{
    const color=PROVIDER_COLORS[name]||'#666';
    legend+=`<div class="line-legend-item"><div class="line-legend-line" style="background:${color}"></div>${name}</div>`;
  });

  body.innerHTML=`<div class="line-chart-wrap">
    <svg class="line-chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
      ${gridLines}${xLabels}${lines}${dots}
    </svg>
    <div class="line-legend">${legend}</div>
  </div>`;
}

// 手势支持 - 左右滑动切换图表
let touchStartX = 0;
let touchEndX = 0;
const SWIPE_THRESHOLD = 50;
let swipeHintShown = true;

function handleTouchStart(e) {
  touchStartX = e.changedTouches[0].screenX;
}

function handleTouchEnd(e) {
  touchEndX = e.changedTouches[0].screenX;
  handleSwipe();
}

function handleSwipe() {
  const diff = touchStartX - touchEndX;
  if (Math.abs(diff) < SWIPE_THRESHOLD) return;
  
  const chartTypes = ['bar', 'pie', 'line'];
  const currentIndex = chartTypes.indexOf(chartType);
  
  if (diff > 0) {
    // 向左滑动 - 下一个图表类型
    const nextIndex = (currentIndex + 1) % chartTypes.length;
    setChartType(chartTypes[nextIndex]);
  } else {
    // 向右滑动 - 上一个图表类型
    const prevIndex = (currentIndex - 1 + chartTypes.length) % chartTypes.length;
    setChartType(chartTypes[prevIndex]);
  }
  
  // 隐藏滑动提示
  if (swipeHintShown) {
    const hint = document.getElementById('swipe-hint');
    if (hint) {
      hint.style.opacity = '0';
      setTimeout(() => {
        hint.style.display = 'none';
      }, 300);
      swipeHintShown = false;
    }
  }
}

// 为对比图表区域添加触摸事件
const compareBody = document.getElementById('compare-body');
if (compareBody) {
  compareBody.addEventListener('touchstart', handleTouchStart, { passive: true });
  compareBody.addEventListener('touchend', handleTouchEnd, { passive: true });
  
  // 触摸时隐藏滑动提示
  compareBody.addEventListener('touchstart', function() {
    if (swipeHintShown) {
      const hint = document.getElementById('swipe-hint');
      if (hint) {
        hint.style.opacity = '0';
        setTimeout(() => {
          hint.style.display = 'none';
        }, 300);
        swipeHintShown = false;
      }
    }
  }, { passive: true });
}

// 检测表格是否可以滚动
function checkTableScroll() {
  const tableWrap = document.querySelector('.table-wrap');
  if (tableWrap) {
    const isScrollable = tableWrap.scrollWidth > tableWrap.clientWidth;
    tableWrap.classList.toggle('scrollable', isScrollable);
    
    // 添加滚动事件监听
    tableWrap.addEventListener('scroll', function() {
      const isAtEnd = this.scrollLeft + this.clientWidth >= this.scrollWidth - 10;
      this.classList.toggle('scrolled-end', isAtEnd);
      
      // 隐藏滚动提示
      if (this.scrollLeft > 10) {
        this.classList.add('scrolled');
      }
    });
  }
}
